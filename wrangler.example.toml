#:schema node_modules/wrangler/config-schema.json
name = "cohive"
compatibility_date = "2026-07-02"
main = "worker.ts"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# ------------------------------------------------------------------------------
# 1. Cloudflare D1 (SQL Database) Binding
# ------------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "cohive_db"
database_id = "YOUR_D1_DATABASE_ID" # `npx wrangler d1 create cohive_db` で取得したIDを設定
migrations_dir = "./migrations"

# ------------------------------------------------------------------------------
# 2. Cloudflare R2 (Object Storage) Binding
# ------------------------------------------------------------------------------
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cohive-storage" # `npx wrangler r2 bucket create cohive-storage` で作成

# ------------------------------------------------------------------------------
# 3. 環境変数定義 (Environment Variables)
# ------------------------------------------------------------------------------
[vars]
ENVIRONMENT = "production"
# ALLOWED_ORIGINS = "https://your-custom-domain.com" # CORS許可ドメイン (カンマ区切り)
# JWT_SECRET = "YOUR_CUSTOM_SECURE_JWT_SECRET" # 未設定の場合は初回セットアップ時に自動生成・D1保存されます
# ENCRYPTION_SECRET = "YOUR_32_BYTE_ENCRYPTION_SECRET" # SMTP情報暗号化用シークレット

# ------------------------------------------------------------------------------
# 4. レートリミット (Workers Rate Limiting) - オプション
# ------------------------------------------------------------------------------
# [[ratelimits]]
# name = "RATE_LIMITER"
# namespace_id = "YOUR_RATE_LIMITER_NAMESPACE_ID"
# [ratelimits.simple]
# limit = 20
# period = 60
